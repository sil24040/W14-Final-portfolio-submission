<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Destination — Travel Planner</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
 
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span>✈️</span> Travel Planner
    </a>
    <div class="navbar-actions">
      <a href="index.html" class="nav-link">Home</a>
      <a href="visited.html" class="nav-link">Visited</a>
    </div>
  </nav>
 
  <div class="page-container">
 
    <a href="index.html" class="back-link">← Back to destinations</a>
 
    <div class="page-header">
      <h1 class="page-title">Add Destination</h1>
      <p class="page-subtitle">Where do you want to go next?</p>
    </div>
 
    <div class="form-card">
 
      <div id="form-message" class="form-message"></div>
 
      <form id="add-form" novalidate>
 
        <!-- City -->
        <div class="form-group">
          <label class="form-label" for="city">City *</label>
          <input class="form-input" type="text" id="city" name="city"
                 placeholder="e.g. Tokyo" required />
        </div>
 
        <!-- Country Dropdown -->
        <div class="form-group">
          <label class="form-label" for="country">Country *</label>
          <select class="form-input country-select" id="country" name="country" required>
            <option value="">— Select a country —</option>
          </select>
        </div>
 
        <!-- Planned Date -->
        <div class="form-group">
          <label class="form-label" for="plannedDate">Planned Visit Date</label>
          <input class="form-input" type="month" id="plannedDate" name="plannedDate" />
        </div>
 
        <!-- Notes -->
        <div class="form-group">
          <label class="form-label" for="notes">Travel Notes</label>
          <textarea class="form-input" id="notes" name="notes"
                    placeholder="Things to do, places to eat, must-sees..."></textarea>
        </div>
 
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Destination</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
        </div>
 
      </form>
    </div>
 
  </div>
 
  <!-- storageModule must load first, then displayModule, then destinationModule -->
  <script src="js/storageModule.js"></script>
  <script src="js/displayModule.js"></script>
  <script src="js/destinationModule.js"></script>
  <script>
    DestinationModule.init();
  </script>
 
</body>
</html>
